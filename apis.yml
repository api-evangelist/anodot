aid: anodot
name: Anodot
description: >-
  Anodot is an AI-powered business monitoring and cloud cost management platform
  providing autonomous anomaly detection, cost optimization, and real-time alerts
  for cloud infrastructure, business metrics, and FinOps workflows.
type: Index
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - AI
  - Anomaly Detection
  - Business Monitoring
  - Cloud Cost Management
  - FinOps
  - Machine Learning
  - Observability
url: >-
  https://raw.githubusercontent.com/api-evangelist/anodot/refs/heads/main/apis.yml
created: '2026-03-27'
modified: '2026-04-19'
specificationVersion: '0.19'
apis:
  - aid: anodot:anodot-business-monitoring-api
    name: Anodot Business Monitoring API
    description: >-
      The Anodot Business Monitoring API provides REST endpoints for anomaly
      detection, alert management, forecasting, metric submission, user management,
      and data integration. It supports bearer token authentication and basic
      authentication with a data collection key. Regional deployments cover US,
      EU (Frankfurt), Asia Pacific, India, and US West Coast. Rate limits are
      500 calls/minute by default (5,000 RPM for metric posting).
    humanURL: https://docs.anodot.com/
    baseURL: https://app.anodot.com
    tags:
      - AI
      - Alerts
      - Anomaly Detection
      - Business Monitoring
      - Forecasting
      - Machine Learning
      - Metrics
      - REST
      - Webhooks
    properties:
      - url: https://docs.anodot.com/
        type: Documentation
      - url: https://docs.anodot.com/reference/authentication
        type: Authentication
      - url: https://www.anodot.com/
        type: Website
      - url: openapi/anodot-openapi.yml
        type: OpenAPI
  - aid: anodot:anodot-cloud-cost-api
    name: Anodot Cloud Cost Management API
    description: >-
      The Anodot Cloud Cost Management API provides programmatic access to cloud
      cost data, anomaly detection for cost spikes, cost allocation, budget
      management, and optimization recommendations across AWS, Azure, and GCP.
    humanURL: https://cloudcost.anodot.com/
    baseURL: https://cloudcost.anodot.com
    tags:
      - AWS
      - Azure
      - Cloud Cost Management
      - Cost Allocation
      - Cost Optimization
      - FinOps
      - GCP
      - Multi-Cloud
    properties:
